<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>OG Image — Мужская среда</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Manrope:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: #000DC3;
      position: relative;
      display: flex;
      align-items: center;
    }

    /* Dot grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Vignette — focused on left side */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 90% at 35% 50%,
        transparent 40%, rgba(0, 8, 120, 0.5) 100%);
    }

    /* Pixel art — right side */
    .art {
      position: absolute;
      right: -40px;
      top: 0;
      bottom: 0;
      width: 560px;
      overflow: hidden;
    }
    .art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.35;
      mask-image: linear-gradient(to right, transparent 0%, black 40%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 40%);
    }

    /* Content — left aligned */
    .content {
      position: relative;
      z-index: 2;
      padding: 0 72px;
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 760px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85);
      font-size: 22px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 100px;
      letter-spacing: 0.03em;
      margin-bottom: 32px;
      width: fit-content;
    }
    .badge::before {
      content: '';
      width: 9px;
      height: 9px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.9;
    }

    .logo {
      font-family: 'Dela Gothic One', sans-serif;
      font-size: 172px;
      line-height: 0.92;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 32px;
    }

    .sub {
      font-size: 38px;
      font-weight: 500;
      color: rgba(255,255,255,0.72);
      line-height: 1.35;
      max-width: 580px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="vignette"></div>
  <div class="art"><img src="Frame 17.jpg" alt="" /></div>

  <div class="content">
    <span class="badge">Онлайн-комьюнити · Старт 1 апреля</span>
    <div class="logo">МУЖСКАЯ<br />СРЕДА</div>
    <p class="sub">Для мужчин, которым есть<br />что сказать — но некому</p>
  </div>
</body>
</html>
